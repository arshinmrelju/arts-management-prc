<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard | PRC Fine Arts</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    :root {
      --bg-color: #050a14;
      --card-bg: rgba(20, 25, 40, 0.6);
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --accent-color: #8b5cf6;
      --accent-hover: #7c3aed;
      --gradient-main: linear-gradient(135deg, #6366f1, #8b5cf6);
      --font-heading: 'Outfit', sans-serif;
      --font-hero: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-color);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      scrollbar-color: rgba(217, 70, 239, 0.5) rgba(0, 0, 0, 0.3);
    }

    body::-webkit-scrollbar {
      width: 12px;
    }

    body::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
    }

    body::-webkit-scrollbar-thumb {
      background: rgba(217, 70, 239, 0.5);
      border-radius: 6px;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      width: 50vw;
      height: 50vw;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.4;
      animation: float 20s infinite alternate ease-in-out;
    }

    body::before {
      top: -10%;
      left: -10%;
      background: radial-gradient(circle, #7c3aed, transparent);
    }

    body::after {
      bottom: -10%;
      right: -10%;
      background: radial-gradient(circle, #db2777, transparent);
      animation-delay: -10s;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(30px, 50px) scale(1.1);
      }
    }

    header {
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 1200px;
      box-sizing: border-box;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 100px;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    header:hover {
      background: rgba(15, 23, 42, 0.75);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .logo {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #f472b6, #a78bfa, #db2777);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(167, 139, 250, 0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo img {
      height: 38px;
      width: auto;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      background: rgba(239, 68, 68, 0.15);
      padding: 3px 8px;
      border-radius: 1rem;
      color: #ef4444;
      font-weight: 700;
      border: 1px solid rgba(239, 68, 68, 0.3);
      letter-spacing: 0.5px;
      margin-left: 10px;
    }

    .pulsate {
      width: 6px;
      height: 6px;
      background: #ef4444;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      animation: pulse-red 2s infinite;
    }

    @keyframes pulse-red {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-family: var(--font-heading);
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      display: flex;
      align-items: center;
      margin-left: 0 !important;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 6px;
      left: 50%;
      width: 0;
      height: 2px;
      background: var(--accent-color);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateX(-50%);
      border-radius: 2px;
    }

    nav a:hover {
      color: white;
      background: rgba(255, 255, 255, 0.05);
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
    }

    nav a:hover::after {
      width: 40%;
    }

    @media (max-width: 768px) {
      header {
        padding: 0.75rem 1.25rem;
        flex-wrap: nowrap;
        width: 92%;
        top: 1rem;
        border-radius: 20px;
        gap: 0;
        background: rgba(15, 23, 42, 0.9);
      }

      nav a {
        margin-left: 1rem;
        font-size: 0.9rem;
      }

      .logo {
        font-size: 1.15rem;
        max-width: 220px;
        line-height: 1.1;
        white-space: normal;
        gap: 12px;
      }

      .logo img {
        height: 40px;
      }
    }

    main {
      padding: 8rem 2rem 6rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Toggle Styles */
    .view-toggle {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
      position: sticky;
      top: 6rem;
      z-index: 100;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(20px);
      padding: 0.4rem;
      border-radius: 100px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .toggle-btn {
      padding: 0.6rem 1.5rem;
      border-radius: 100px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-btn i {
      font-size: 0.9rem;
      opacity: 0.7;
    }

    .toggle-btn.active {
      background: white;
      color: #0f172a;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
    }

    .toggle-btn:not(.active):hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }

    .toggle-btn:hover:not(.active) {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .hero-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 1rem 4rem;
      position: relative;
      z-index: 10;
    }

    .hero-title {
      font-family: var(--font-hero);
      font-size: 5.5rem;
      font-weight: 800;
      color: white;
      margin: 0 0 1rem;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
      animation: fadeScaleIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .hero-subtitle {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 700;
      color: #818cf8;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      margin: 0;
      opacity: 0;
      animation: fadeInUp 1s 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* Hamburger Menu Button */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      z-index: 1001;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .hamburger span {
      display: block;
      width: 20px;
      height: 2px;
      background: white;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* Mobile Navigation Drawer */
    .mobile-nav {
      position: fixed;
      top: 0;
      right: -100%;
      width: 75%;
      height: 100vh;
      background: rgba(15, 23, 42, 0.98);
      backdrop-filter: blur(20px);
      z-index: 1000;
      padding: 7rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
    }

    .mobile-nav.active { right: 0; }

    .mobile-nav a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 1.2rem;
      font-family: var(--font-heading);
      font-weight: 600;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .nav-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 999;
      display: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .nav-overlay.active { display: block; opacity: 1; }

    .hero-decorations {
      height: 60px;
      width: 100%;
      position: relative;
      margin-bottom: 1rem;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0;
      filter: blur(1px);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      animation: float-stardust 10s infinite ease-in-out;
    }

    .p1 { width: 4px; height: 4px; left: 20%; animation-delay: 0s; }
    .p2 { width: 3px; height: 3px; left: 40%; animation-delay: 2s; }
    .p3 { width: 5px; height: 5px; left: 60%; animation-delay: 4s; }
    .p4 { width: 2px; height: 2px; left: 80%; animation-delay: 1s; }
    .p5 { width: 4px; height: 4px; left: 35%; animation-delay: 6s; }
    .p6 { width: 3px; height: 3px; left: 75%; animation-delay: 3s; }

    @keyframes float-stardust {
      0% { transform: translateY(20px) scale(0); opacity: 0; }
      20% { opacity: 0.6; }
      50% { transform: translateY(-20px) translateX(15px) scale(1.2); opacity: 0.3; }
      80% { opacity: 0.6; }
      100% { transform: translateY(-40px) translateX(-10px) scale(0); opacity: 0; }
    }

    @keyframes fadeScaleIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(30px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .leaderboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-bottom: 4rem;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 2rem;
      margin-bottom: 4rem;
    }

    .item-card {
      background: rgba(15, 20, 35, 0.5);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1.5rem;
      padding: 1.5rem;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .item-card:hover {
      transform: translateY(-5px);
      border-color: rgba(139, 92, 246, 0.3);
      background: rgba(15, 20, 35, 0.7);
    }

    .item-card-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 1rem;
      margin-bottom: 1.25rem;
    }

    .item-card-title {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      font-weight: 700;
      color: white;
      margin: 0;
    }

    .winner-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 1rem;
      margin-bottom: 0.75rem;
      border: 1px solid transparent;
      transition: all 0.3s;
    }

    .winner-row:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.05);
    }

    .winner-pos {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .winner-pos.pos-1 { background: linear-gradient(135deg, #fde047, #f59e0b); color: #78350f; }
    .winner-pos.pos-2 { background: linear-gradient(135deg, #e2e8f0, #94a3b8); color: #0f172a; }
    .winner-pos.pos-3 { background: linear-gradient(135deg, #fdba74, #ea580c); color: #431407; }

    .winner-info {
      flex: 1;
    }

    .winner-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: white;
      text-transform: uppercase;
    }

    .winner-dept {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .winner-pts {
      font-weight: 700;
      color: #fbbf24;
      font-size: 0.9rem;
    }

    /* Animation for new cards */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .item-card {
      animation: fadeInUp 0.5s ease backwards;
    }

    @media (max-width: 768px) {
      .leaderboard-grid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }
      header nav { display: none; }
      .hamburger { display: flex; }
      .logo { font-size: 1.1rem; }
      .logo img { height: 32px; }
      .live-indicator { display: none; }
      
      .hero-title {
        font-size: 2.75rem;
        margin-bottom: 0.5rem;
      }
      .hero-subtitle {
        font-size: 0.85rem;
        letter-spacing: 0.2em;
      }
      .hero-container {
        padding: 4rem 1rem 2rem;
      }
      .view-toggle {
        top: 5rem;
        padding: 0.3rem;
        margin-bottom: 2rem;
      }
      .toggle-btn {
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
      }

      .rank-card {
        padding: 1rem;
        gap: 1rem;
      }
      .rank-badge {
        width: 38px;
        height: 38px;
        font-size: 1rem;
      }
      .dept-name { font-size: 0.95rem; }
      .dept-score { font-size: 1.35rem; }
    }

    .rank-card {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 1rem;
      padding: 1.25rem 2rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .rank-card:hover {
      transform: translateX(10px);
      background: rgba(30, 41, 59, 0.5);
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .rank-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--accent-color);
      opacity: 0.5;
      transition: all 0.3s;
    }

    .rank-card:hover::before {
      opacity: 1;
      width: 6px;
    }

    /* Rank 1 Styling */
    .rank-card.rank-1 {
      background: rgba(251, 191, 36, 0.03);
      border-color: rgba(251, 191, 36, 0.2);
    }

    .rank-card.rank-1:hover {
      background: rgba(251, 191, 36, 0.08);
      border-color: rgba(251, 191, 36, 0.4);
    }


    .rank-card.rank-1 .rank-badge {
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .rank-card.rank-1 .dept-score {
      color: #fbbf24;
    }

    .rank-card.rank-1::before {
      background: #fbbf24;
    }

    .rank-card.rank-2 {
      background: rgba(148, 163, 184, 0.03);
      border-color: rgba(148, 163, 184, 0.2);
    }

    .rank-card.rank-2 .rank-badge {
      background: rgba(148, 163, 184, 0.15);
      color: #cbd5e1;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    .rank-card.rank-2 .dept-score {
      color: #cbd5e1;
    }

    .rank-card.rank-2::before {
      background: #94a3b8;
    }

    .rank-card.rank-3 {
      background: rgba(217, 119, 6, 0.03);
      border-color: rgba(217, 119, 6, 0.2);
    }

    .rank-card.rank-3 .rank-badge {
      background: rgba(217, 119, 6, 0.15);
      color: #fdba74;
      border: 1px solid rgba(217, 119, 6, 0.3);
    }

    .rank-card.rank-3 .dept-score {
      color: #fdba74;
    }

    .rank-card.rank-3::before {
      background: #d97706;
    }

    .rank-badge {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      font-family: var(--font-heading);
      flex-shrink: 0;
      color: var(--text-secondary);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .dept-info {
      flex: 1;
      z-index: 1;
    }

    .dept-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f8fafc;
      font-family: var(--font-heading);
      margin: 0;
      letter-spacing: 0.2px;
    }

    .dept-score {
      font-size: 1.75rem;
      font-weight: 800;
      color: #fff;
      font-family: var(--font-heading);
      line-height: 1;
      margin-left: auto;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .dept-score span {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
      -webkit-text-fill-color: var(--text-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @keyframes dropIn {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(calc(var(--target-scale) - 0.05));
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(var(--target-scale));
      }
    }

    @keyframes rotateGlow {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Details Modal styling derived from index.html */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
    }

    .hidden {
      display: none !important;
    }

    .modal-content {
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 95%;
      max-width: 800px;
      max-height: 90vh;
      border-radius: 1.5rem;
      overflow-y: auto;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transform: scale(0.95) translateY(20px);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @media (max-width: 768px) {
      .modal-content {
        width: 100%;
        height: 100%;
        max-height: 100vh;
        border-radius: 0;
        border: none;
      }

      .modal-header {
        padding: 1rem 1.25rem;
        position: sticky;
        top: 0;
        background: #0f172a;
        z-index: 10;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .modal-title {
        font-size: 1.4rem;
      }

      .modal-body {
        padding: 1.25rem;
      }

      .chart-container {
        height: 220px;
        margin-bottom: 1.5rem;
      }
    }

    .modal-overlay.active .modal-content {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.05);
      border: none;
      color: #94a3b8;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      transform: rotate(90deg);
    }

    .modal-body {
      padding: clamp(1rem, 5vw, 2rem);
    }

    .chart-container {
      position: relative;
      height: 300px;
      width: 100%;
      margin-bottom: 2rem;
    }

    .achievements-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
    }

    .achievement-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1rem;
      padding: 1.25rem;
      transition: background 0.3s;
    }

    .achievement-card:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .achievement-item {
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .achievement-student {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .achievement-position {
      color: var(--accent-light, #a78bfa);
      font-weight: 500;
      font-size: 0.9rem;
    }

    .achievement-pts {
      float: right;
      font-weight: 700;
      color: #fbbf24;
    }

    #loader {
      text-align: center;
      padding: 4rem;
      color: var(--text-secondary);
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      background: rgba(239, 68, 68, 0.15);
      padding: 3px 8px;
      border-radius: 1rem;
      color: #ef4444;
      font-weight: 700;
      border: 1px solid rgba(239, 68, 68, 0.3);
      letter-spacing: 0.5px;
    }

    .pulsate {
      width: 6px;
      height: 6px;
      background: #ef4444;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      animation: pulse-red 2s infinite;
    }

    @keyframes pulse-red {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }

      70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
      }

      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    .podium-area {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 2rem;
      margin: 4rem auto 6rem;
      max-width: 1000px;
      padding: 0 1rem;
    }

    .podium-rank {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      transition: all 0.5s ease;
    }

    .podium-rank .rank-card {
      width: 100%;
      flex-direction: column;
      padding: 2.5rem 1.5rem;
      text-align: center;
      gap: 1rem;
    }

    .podium-rank.rank-1-box {
      order: 2;
      transform: scale(1.1);
      z-index: 5;
      margin-bottom: 2rem;
    }

    .podium-rank.rank-2-box {
      order: 1;
      transform: scale(0.95);
      opacity: 0.9;
    }

    .podium-rank.rank-3-box {
      order: 3;
      transform: scale(0.9);
      opacity: 0.8;
    }

    .podium-rank .dept-score {
      font-size: 3rem;
    }

    .podium-rank .rank-badge {
      width: 80px;
      height: 80px;
      font-size: 2.2rem;
    }

    @media (max-width: 768px) {
      main {
        padding: 8rem 1rem 4rem !important;
      }

      .hero-title {
        font-size: 2rem !important;
      }

      .hero-subtitle {
        font-size: 0.85rem !important;
        margin-bottom: 1.5rem !important;
      }

      .view-toggle {
        margin-bottom: 1.5rem !important;
      }

      .search-container {
        margin-bottom: 1.5rem !important;
      }

      /* Make Podium Look Like the Rest of the Leaderboard on Mobile */
      .podium-area,
      .leaderboard-grid {
        display: flex !important;
        flex-direction: column !important;
        gap: 0.75rem !important;
        width: 100% !important;
        margin: 0 auto 0.75rem auto !important;
        padding: 0 !important;
      }

      .podium-rank {
        width: 100% !important;
        margin: 0 !important;
        display: block !important;
      }

      /* Order 1st, 2nd, 3rd top to bottom */
      .podium-rank.rank-1-box { order: 1 !important; padding: 0 !important; }
      .podium-rank.rank-2-box { order: 2 !important; padding: 0 !important; }
      .podium-rank.rank-3-box { order: 3 !important; padding: 0 !important; }

      .podium-rank .rank-card,
      .leaderboard-grid .rank-card {
        padding: 1rem !important;
        border-radius: 1rem !important;
        min-height: auto !important;
        height: auto !important;
      }

      /* Uniform list row layout */
      .podium-rank .rank-card-header,
      .leaderboard-grid .rank-card-header {
        display: flex !important;
        flex-direction: row !important;
        align-items: center !important;
        gap: 0.75rem !important;
        width: 100% !important;
        text-align: left !important;
      }

      .podium-rank .rank-badge,
      .leaderboard-grid .rank-badge {
        width: 40px !important;
        height: 40px !important;
        font-size: 1.1rem !important;
        flex-shrink: 0 !important;
        margin: 0 !important;
      }

      .podium-rank .dept-info,
      .leaderboard-grid .dept-info {
        flex: 1 !important;
        min-width: 0 !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        text-align: left !important;
      }

      .podium-rank .dept-name,
      .leaderboard-grid .dept-name {
        font-size: 0.95rem !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
        margin-bottom: 4px !important;
      }

      .podium-rank .dept-score,
      .leaderboard-grid .dept-score {
        font-size: 1.25rem !important;
        flex-shrink: 0 !important;
        display: flex !important;
        align-items: baseline !important;
        gap: 2px !important;
        justify-content: flex-end !important;
      }

      .podium-rank .dept-score span:last-child,
      .leaderboard-grid .dept-score span:last-child {
        font-size: 0.6rem !important;
      }

      .podium-rank .progress-container,
      .leaderboard-grid .progress-container {
        display: block !important;
      }

      .trend-indicator {
        display: none !important;
      }

      .expand-icon {
        font-size: 0.8rem !important;
        margin-left: 0.25rem !important;
        margin-top: 0 !important;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Search Bar */
    .search-container {
      max-width: 600px;
      margin: 0 auto 2rem;
      position: relative;
      z-index: 10;
    }

    .search-container input {
      width: 100%;
      padding: 1rem 3.5rem 1rem 3.5rem;
      border-radius: 100px;
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      font-family: var(--font-body);
      font-size: 1rem;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    
    .search-container input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
    
    .clear-search {
      position: absolute;
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 1rem;
      cursor: pointer;
      transition: color 0.3s;
    }
    .clear-search:hover {
      color: white;
    }

    .search-container input:focus {
      outline: none;
      border-color: var(--accent-color);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
    }

    .search-icon {
      position: absolute;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    /* Progress Bar */
    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      margin-top: 0.8rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #d946ef);
      border-radius: 10px;
      width: 0%;
      transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
    }

    .rank-1 .progress-bar { background: linear-gradient(90deg, #fde047, #f59e0b); box-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
    .rank-2 .progress-bar { background: linear-gradient(90deg, #e2e8f0, #94a3b8); box-shadow: 0 0 10px rgba(148, 163, 184, 0.5); }
    .rank-3 .progress-bar { background: linear-gradient(90deg, #fdba74, #ea580c); box-shadow: 0 0 10px rgba(234, 88, 12, 0.5); }

    /* Trend Indicator */
    .trend-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 20px;
      margin-left: auto;
    }
    
    .trend-up {
      color: #10b981;
      background: rgba(16, 185, 129, 0.1);
    }
    
    .trend-down {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    /* Expandable Content */
    .expandable-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      width: 100%;
      opacity: 0;
    }

    .rank-card.expanded {
      background: rgba(30, 41, 59, 0.7);
      border-color: rgba(139, 92, 246, 0.4);
    }

    .rank-card.expanded .expandable-content {
      max-height: 500px;
      opacity: 1;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .expandable-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.8rem;
    }
    
    .expand-icon {
      color: var(--text-secondary);
      transition: transform 0.3s;
    }
    
    .expanded .expand-icon {
      transform: rotate(180deg);
    }
    
    .podium-rank .rank-card-header {
      flex-direction: column !important;
      text-align: center;
      gap: 1rem !important;
    }
    
    .podium-rank .dept-info {
      width: 100%;
    }
    
    .podium-rank .trend-indicator {
      display: none;
    }
    
    .podium-rank .expand-icon {
      margin-top: 0.5rem;
    }
  </style>
</head>

<body>

  <header>

      PRC Fine Arts
      <div class="live-indicator">
        <span class="pulsate"></span>
        LIVE
      </div>
    </a>
    <nav>
      <a href="/">Home</a>
      <a href="/index.html#events">Events</a>
      <a href="/leaderboard.html" style="color: white; text-shadow: 0 0 10px rgba(255,255,255,0.5);">Leaderboard</a>
    </nav>
    <div class="hamburger" id="hamburger-menu">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>

  <div class="mobile-nav" id="mobile-drawer">
    <a href="/" class="mobile-link">Home</a>
    <a href="/index.html#events" class="mobile-link">Events</a>
    <a href="/leaderboard.html" class="mobile-link" style="color: white; font-weight: 700;">Leaderboard</a>
  </div>
  <div class="nav-overlay" id="mobile-overlay"></div>

  <main>
    <div class="hero-container">
      <div class="hero-decorations">
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
      </div>
      <h1 class="hero-title">Leaderboard</h1>
      <p class="hero-subtitle">Visual score breakdown for the academic year</p>
    </div>

    <div class="view-toggle">
      <button class="toggle-btn active" onclick="switchView('dept')">
        <i class="fas fa-building"></i> Departments
      </button>
      <button class="toggle-btn" onclick="switchView('items')">
        <i class="fas fa-trophy"></i> Item Winners
      </button>
    </div>

    <div id="dept-view">
      <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="dept-search" placeholder="Search departments..." oninput="filterDepartments()">
        <i class="fas fa-times clear-search" id="clear-search" onclick="clearSearch()" style="display: none;"></i>
      </div>
      <div id="podium-container" class="podium-area"></div>
      <div id="leaderboard-container" class="leaderboard-grid"></div>
    </div>

    <div id="items-view" class="hidden">
      <div id="items-container" class="items-grid"></div>
    </div>
  </main>

  <div id="details-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-dept-name" class="modal-title">Department Name</h2>
        <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div id="chart-loader" style="text-align:center; padding: 2rem; color: #94a3b8;">
          <div class="spinner" style="width: 30px; height: 30px;"></div> Loading chart...
        </div>
        <div class="chart-container">
          <canvas id="scoreChart" style="display:none;"></canvas>
        </div>
        <h3 style="font-family: var(--font-heading); margin-bottom: 1rem;">Recent Achievements</h3>
        <div id="achievements-container" class="achievements-grid"></div>
        <div id="no-data-msg" style="display:none; text-align:center; padding: 2rem; color: #94a3b8;">No records found.
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
    import { firebaseConfig } from "./assets/core/firebase-config.js";

    // Initialize Firebase
    window.app = initializeApp(firebaseConfig);
    window.db = getFirestore(window.app);
    let systemYear = '2025-26'; // Default
    let pointsListener = null;
    let logsListener = null;

    window.switchView = (view) => {
      const deptBtn = document.querySelector('.toggle-btn:nth-child(1)');
      const itemBtn = document.querySelector('.toggle-btn:nth-child(2)');
      const deptView = document.getElementById('dept-view');
      const itemsView = document.getElementById('items-view');

      if (view === 'dept') {
        deptBtn.classList.add('active');
        itemBtn.classList.remove('active');
        deptView.classList.remove('hidden');
        itemsView.classList.add('hidden');
      } else {
        deptBtn.classList.remove('active');
        itemBtn.classList.add('active');
        deptView.classList.add('hidden');
        itemsView.classList.remove('hidden');
      }
    };

    // Mobile Nav Logic
    const hamburger = document.getElementById('hamburger-menu');
    const mobileDrawer = document.getElementById('mobile-drawer');
    const mobileOverlay = document.getElementById('mobile-overlay');
    const mobileLinks = document.querySelectorAll('.mobile-link');

    const toggleMobileNav = () => {
      if (!hamburger || !mobileDrawer || !mobileOverlay) return;
      hamburger.classList.toggle('active');
      mobileDrawer.classList.toggle('active');
      mobileOverlay.classList.toggle('active');
      document.body.style.overflow = mobileDrawer.classList.contains('active') ? 'hidden' : '';
    };

    if (hamburger && mobileDrawer && mobileOverlay) {
      hamburger.addEventListener('click', toggleMobileNav);
      mobileOverlay.addEventListener('click', toggleMobileNav);
    }

    mobileLinks.forEach(link => {
      link.addEventListener('click', toggleMobileNav);
    });

    window.filterDepartments = () => {
      const input = document.getElementById('dept-search');
      const clearBtn = document.getElementById('clear-search');
      const query = input.value.toLowerCase();
      
      if (clearBtn) {
        clearBtn.style.display = query.length > 0 ? 'block' : 'none';
      }

      const cards = document.querySelectorAll('.leaderboard-grid .rank-card, .podium-area .podium-rank');
      cards.forEach(card => {
        const deptNameEl = card.querySelector('.dept-name');
        if(deptNameEl) {
          const deptName = deptNameEl.textContent.toLowerCase();
          if (deptName.includes(query)) {
            card.style.display = '';
          } else {
            card.style.display = 'none';
          }
        }
      });
    };

    window.clearSearch = () => {
      const input = document.getElementById('dept-search');
      if (input) {
        input.value = '';
        window.filterDepartments();
        input.focus();
      }
    };

    const animateCounters = () => {
      const counters = document.querySelectorAll('.counter');
      counters.forEach(counter => {
        const target = +counter.getAttribute('data-target');
        if (target === 0) return;
        const duration = 1500;
        const stepTime = Math.max(10, Math.floor(duration / target));
        let current = 0;
        
        const timer = setInterval(() => {
          current += Math.max(1, Math.ceil(target / 50));
          if (current >= target) {
            counter.innerText = target;
            clearInterval(timer);
          } else {
            counter.innerText = current;
          }
        }, stepTime);
      });
      
      setTimeout(() => {
        const progressBars = document.querySelectorAll('.progress-bar');
        progressBars.forEach(bar => {
          bar.style.width = bar.getAttribute('data-width');
        });
      }, 100);
    };

    window.toggleExpand = async (event, deptId, deptName) => {
      const card = event.currentTarget;
      const content = card.querySelector('.expandable-content');
      const itemsContainer = card.querySelector('.expand-items');
      const loader = card.querySelector('.expand-loader');
      
      const isExpanded = card.classList.contains('expanded');
      
      if (!isExpanded) {
        card.classList.add('expanded');
        if (itemsContainer.innerHTML === '') {
          loader.style.display = 'block';
          try {
            const q = query(collection(db, "score_logs"),
              where("department", "==", deptName),
              where("academicYear", "==", systemYear)
            );
            const querySnapshot = await getDocs(q);
            
            let html = '';
            if (querySnapshot.empty) {
              html = '<div style="color: #94a3b8; font-size: 0.9rem; grid-column: 1/-1; text-align: center;">No recent item wins found.</div>';
            } else {
              const logs = [];
              querySnapshot.forEach(doc => logs.push(doc.data()));
              logs.sort((a, b) => (b.timestamp ? new Date(b.timestamp).getTime() : 0) - (a.timestamp ? new Date(a.timestamp).getTime() : 0));
              
              logs.slice(0, 6).forEach(log => {
                let posClass = 'color: var(--text-secondary);';
                if (log.position === '1st' || log.position === '1') posClass = 'color: #fbbf24; font-weight: bold;';
                else if (log.position === '2nd' || log.position === '2') posClass = 'color: #94a3b8; font-weight: bold;';
                else if (log.position === '3rd' || log.position === '3') posClass = 'color: #d97706; font-weight: bold;';
                
                html += `
                  <div style="background: rgba(255,255,255,0.05); padding: 0.8rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.05); text-align: left;">
                    <div style="float: right; text-align: right;">
                      <div style="color: #fbbf24; font-weight: bold;">+${log.points || 0} pts</div>
                      <div style="font-size: 0.75rem; ${posClass}">${log.position || '-'}</div>
                    </div>
                    <div style="font-weight: 600; font-size: 0.9rem; margin-bottom: 4px;">${log.itemName || 'Item'}</div>
                    <div style="font-size: 0.8rem; color: #94a3b8;">${log.studentName || 'Multiple'}</div>
                  </div>
                `;
              });
              if (logs.length > 6) {
                html += `<div style="grid-column: 1/-1; text-align: center; margin-top: 0.5rem;"><button onclick="event.stopPropagation(); openDetails('${deptName.replace(/'/g, "\\'")}')" style="background: transparent; border: 1px solid var(--accent-color); color: var(--text-primary); padding: 0.5rem 1.5rem; border-radius: 100px; cursor: pointer; font-family: var(--font-body); font-size: 0.9rem; transition: all 0.3s;" onmouseover="this.style.background='var(--accent-color)'" onmouseout="this.style.background='transparent'">View All & Analytics</button></div>`;
              } else {
                 html += `<div style="grid-column: 1/-1; text-align: center; margin-top: 0.5rem;"><button onclick="event.stopPropagation(); openDetails('${deptName.replace(/'/g, "\\'")}')" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text-secondary); padding: 0.4rem 1rem; border-radius: 100px; cursor: pointer; font-family: var(--font-body); font-size: 0.8rem; transition: all 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.color='white';" onmouseout="this.style.background='transparent'; this.style.color='var(--text-secondary)';"><i class="fas fa-chart-line" style="margin-right: 5px;"></i> Analytics</button></div>`;
              }
            }
            itemsContainer.innerHTML = html;
          } catch(err) {
            console.error(err);
            itemsContainer.innerHTML = '<div style="color: #ef4444; font-size: 0.9rem; grid-column: 1/-1; text-align: center;">Failed to load items.</div>';
          }
          loader.style.display = 'none';
        }
      } else {
        card.classList.remove('expanded');
      }
    };

    // Fetch system year first
    async function init() {
      try {
        const yearRef = doc(db, "system_config", "current_year");
        const docSnap = await getDoc(yearRef);
        if (docSnap.exists()) {
          const data = docSnap.data();
          systemYear = data.year || "2025-26";
        }
        startListener();
      } catch (err) {
        console.error("Error fetching settings:", err);
        startListener(); // fallback
      }
    }

    function startListener() {
      // 1. Department Scores Listener
      const qDept = query(collection(db, "leaderboard"), where("academicYear", "==", systemYear));
      pointsListener = onSnapshot(qDept, (snapshot) => {
        const container = document.getElementById('leaderboard-container');
        const podiumArea = document.getElementById('podium-container');

        if (snapshot.empty) {
          container.innerHTML = '<div style="text-align:center; grid-column: 1/-1; color: var(--text-secondary); padding: 4rem;">No scores generated for this year yet.</div>';
          podiumArea.innerHTML = '';
          return;
        }

        const leaderboardMap = new Map();
        snapshot.forEach(doc => {
          const data = doc.data();
          const deptName = data.department || doc.id;
          const score = data.score || 0;
          const docId = doc.id;

          const isOfficialId = docId === `${deptName}_${systemYear}`;
          if (!leaderboardMap.has(deptName) || isOfficialId) {
            leaderboardMap.set(deptName, {
              id: docId,
              department: deptName,
              score: score
            });
          }
        });

        const leaderboardData = Array.from(leaderboardMap.values());
        leaderboardData.sort((a, b) => b.score - a.score);

        const filteredData = leaderboardData.filter(d =>
          d.id !== "B.A Economics" && d.id !== "B.A Econometrics and Data Management"
        );

        let podiumHtml = '';
        let gridHtml = '';
        const maxScore = filteredData.length > 0 ? filteredData[0].score : 1;

        filteredData.forEach((data, index) => {
          const rank = index + 1;
          const score = data.score;
          const isTie = (index > 0 && filteredData[index - 1].score === score) ||
            (index < filteredData.length - 1 && filteredData[index + 1].score === score);

          let rankIcon = `<span style="font-size: 0.8rem; font-weight: 500;">#</span>${rank}`;
          let rankClass = '';
          if (isTie) {
            rankIcon = '<i class="fas fa-equals" style="font-size: 1.2rem; opacity: 0.7;"></i>';
          } else if (rank === 1) {
            rankIcon = '<i class="fas fa-trophy"></i>';
            rankClass = 'rank-1';
          } else if (rank === 2) {
            rankIcon = '<i class="fas fa-medal"></i>';
            rankClass = 'rank-2';
          } else if (rank === 3) {
            rankIcon = '<i class="fas fa-medal"></i>';
            rankClass = 'rank-3';
          }

          const deptSafe = (data.department || data.id).replace(/'/g, "\\'");
          const deptIdSafe = data.id.replace(/'/g, "\\'").replace(/[^a-zA-Z0-9]/g, '');
          const trendHtml = score > 0 ? `<div class="trend-indicator trend-up"><i class="fas fa-arrow-trend-up"></i></div>` : `<div class="trend-indicator trend-down" style="color: #94a3b8; background: transparent;"><i class="fas fa-minus"></i></div>`;
          const widthPct = maxScore > 0 ? (score / maxScore) * 100 : 0;

          const cardHtml = `
            <div class="rank-card ${rankClass}" onclick="toggleExpand(event, '${deptIdSafe}', '${deptSafe}')" style="animation: dropIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) ${index * 0.08}s both; flex-direction: column; align-items: stretch; gap: 0;">
              <div class="rank-card-header" style="display: flex; width: 100%; align-items: center; gap: 1.5rem; cursor: pointer; text-align: left;">
                <div class="rank-badge">${rankIcon}</div>
                <div class="dept-info">
                  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <h3 class="dept-name" style="margin: 0; font-size: 1.1rem; color: white;">${data.department || data.id}</h3>
                    ${trendHtml}
                  </div>
                  <div class="progress-container">
                    <div class="progress-bar" style="width: 0%" data-width="${widthPct}%"></div>
                  </div>
                </div>
                <div class="dept-score" style="display: flex; align-items: baseline; justify-content: flex-end; gap: 4px; font-size: 1.75rem;">
                  <span class="counter" data-target="${score}">0</span> 
                  <span style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;">pts</span>
                </div>
                <i class="fas fa-chevron-down expand-icon" style="color: var(--text-secondary); margin-left: 0.5rem;"></i>
              </div>
              <div class="expandable-content" id="expand-${deptIdSafe}" onclick="event.stopPropagation()">
                <div class="expand-loader" style="display: none; text-align: center; color: #94a3b8; padding: 1rem;"><i class="fas fa-circle-notch fa-spin"></i> Loading...</div>
                <div class="expand-items expandable-grid"></div>
              </div>
            </div>
          `;

          if (index < 3) {
            podiumHtml += `<div class="podium-rank rank-${index + 1}-box">${cardHtml}</div>`;
          } else {
            gridHtml += cardHtml;
          }
        });

        podiumArea.innerHTML = podiumHtml;
        container.innerHTML = gridHtml;
        
        setTimeout(animateCounters, 100);
      });

      // 2. Individual Item Winners Listener
      const qLogs = query(collection(db, "score_logs"), where("academicYear", "==", systemYear));
      logsListener = onSnapshot(qLogs, (snapshot) => {
        const itemContainer = document.getElementById('items-container');
        if (snapshot.empty) {
          itemContainer.innerHTML = '<div style="text-align:center; grid-column: 1/-1; color: var(--text-secondary); padding: 4rem;">No winners announced yet.</div>';
          return;
        }

        const itemsMap = {};
        snapshot.forEach(doc => {
          const data = doc.data();
          const itemName = data.itemName || "Unknown Item";
          if (!itemsMap[itemName]) itemsMap[itemName] = [];
          itemsMap[itemName].push(data);
        });

        let itemsHtml = '';
        const sortedItems = Object.keys(itemsMap).sort();

        sortedItems.forEach(itemName => {
          const winners = itemsMap[itemName];
          // Sort winners by position (1st, 2nd, 3rd)
          winners.sort((a, b) => {
            const getPosValue = (pos) => {
              if (pos === "1st" || pos === "1") return 1;
              if (pos === "2nd" || pos === "2") return 2;
              if (pos === "3rd" || pos === "3") return 3;
              return 4;
            };
            return getPosValue(a.position) - getPosValue(b.position);
          });

          let winnersHtml = '';
          winners.forEach(w => {
            let posClass = 'pos-3';
            let posLabel = w.position || '-';
            if (posLabel === '1st' || posLabel === '1') { posClass = 'pos-1'; posLabel = '1'; }
            else if (posLabel === '2nd' || posLabel === '2') { posClass = 'pos-2'; posLabel = '2'; }
            else if (posLabel === '3rd' || posLabel === '3') { posClass = 'pos-3'; posLabel = '3'; }

            winnersHtml += `
              <div class="winner-row">
                <div class="winner-pos ${posClass}">${posLabel}</div>
                <div class="winner-info">
                  <div class="winner-name">${w.studentName || 'Unknown'}</div>
                  <div class="winner-dept">${w.department || ''}</div>
                </div>
                <div class="winner-pts">${w.points || 0} pts</div>
              </div>
            `;
          });

          itemsHtml += `
            <div class="item-card">
              <div class="item-card-header">
                <h3 class="item-card-title">${itemName}</h3>
              </div>
              <div class="item-winners">
                ${winnersHtml}
              </div>
            </div>
          `;
        });

        itemContainer.innerHTML = itemsHtml;
      });
    }

    let currentScoreChart = null;

    window.openDetails = async (dept) => {
      const modal = document.getElementById('details-modal');
      const title = document.getElementById('modal-dept-name');
      const achContainer = document.getElementById('achievements-container');
      const noData = document.getElementById('no-data-msg');
      const chartLoader = document.getElementById('chart-loader');
      const canvas = document.getElementById('scoreChart');

      title.textContent = dept;
      modal.style.display = 'flex';
      setTimeout(() => modal.classList.add('active'), 10);

      chartLoader.style.display = 'block';
      canvas.style.display = 'none';
      noData.style.display = 'none';
      achContainer.innerHTML = '';

      if (currentScoreChart) {
        currentScoreChart.destroy();
        currentScoreChart = null;
      }

      try {
        const q = query(collection(db, "score_logs"),
          where("department", "==", dept),
          where("academicYear", "==", systemYear)
        );
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          chartLoader.style.display = 'none';
          noData.style.display = 'block';
          return;
        }

        const logs = [];
        const dataMap = {};

        querySnapshot.forEach(doc => {
          const data = doc.data();
          logs.push(data);
          const item = data.itemName || "Other";
          dataMap[item] = (dataMap[item] || 0) + (data.points || 0);
        });

        // Charts
        const labels = Object.keys(dataMap);
        const values = Object.values(dataMap);

        chartLoader.style.display = 'none';
        canvas.style.display = 'block';

        const ctx = canvas.getContext('2d');
        currentScoreChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Points Earned',
              data: values,
              backgroundColor: 'rgba(139, 92, 246, 0.7)',
              borderColor: 'rgba(139, 92, 246, 1)',
              borderWidth: 1,
              borderRadius: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false }
            },
            scales: {
              y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
              x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
            }
          }
        });

        // Recent Achievements
        logs.sort((a, b) => {
          const ta = a.timestamp ? new Date(a.timestamp).getTime() : 0;
          const tb = b.timestamp ? new Date(b.timestamp).getTime() : 0;
          return tb - ta;
        });

        let achHtml = '';
        logs.forEach(log => {
          let posStr = '';
          if (log.position) posStr = `<div class="achievement-position">${log.position}</div>`;
          achHtml += `
            <div class="achievement-card">
              <span class="achievement-pts">+${log.points || 0}</span>
              <div class="achievement-item">${log.itemName || 'Unknown Item'}</div>
              <div class="achievement-student">${log.studentName || 'Multiple'}</div>
              ${posStr}
            </div>
          `;
        });
        achContainer.innerHTML = achHtml;

      } catch (err) {
        console.error("Error fetching details:", err);
        chartLoader.style.display = 'none';
        achContainer.innerHTML = '<div style="color: #ef4444;">Failed to load details.</div>';
      }
    };

    window.closeModal = () => {
      const modal = document.getElementById('details-modal');
      modal.classList.remove('active');
      setTimeout(() => modal.style.display = 'none', 300);
    };

    // Close on click outside
    document.getElementById('details-modal').addEventListener('click', (e) => {
      if (e.target.id === 'details-modal') window.closeModal();
    });

    init();
  </script>
  <script type="module" src="/assets/core/analytics.js"></script>
</body>

</html>
