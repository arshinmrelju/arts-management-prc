<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard | PRC Fine Arts</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/favicon-square.png" sizes="512x512">
  <link rel="icon" type="image/png" href="/assets/favicon-square.png" sizes="192x192">
  <link rel="icon" type="image/png" href="/assets/favicon.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/assets/favicon-square.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    :root {
      --bg-color: #050a14;
      --card-bg: rgba(20, 25, 40, 0.6);
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --accent-color: #8b5cf6;
      --accent-hover: #7c3aed;
      --gradient-main: linear-gradient(135deg, #6366f1, #8b5cf6);
      --font-heading: 'Outfit', sans-serif;
      --font-hero: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-color);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      scrollbar-color: rgba(217, 70, 239, 0.5) rgba(0, 0, 0, 0.3);
    }

    body::-webkit-scrollbar {
      width: 12px;
    }

    body::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
    }

    body::-webkit-scrollbar-thumb {
      background: rgba(217, 70, 239, 0.5);
      border-radius: 6px;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      width: 50vw;
      height: 50vw;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.4;
      animation: float 20s infinite alternate ease-in-out;
    }

    body::before {
      top: -10%;
      left: -10%;
      background: radial-gradient(circle, #7c3aed, transparent);
    }

    body::after {
      bottom: -10%;
      right: -10%;
      background: radial-gradient(circle, #db2777, transparent);
      animation-delay: -10s;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(30px, 50px) scale(1.1);
      }
    }

    header {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .logo {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #f472b6, #a78bfa, #db2777);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(167, 139, 250, 0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo img {
      height: 45px;
      width: auto;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
    }

    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      margin-left: 2rem;
      font-family: var(--font-heading);
      font-weight: 500;
      font-size: 1rem;
      transition: all 0.3s;
    }

    nav a:hover {
      color: white;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    @media (max-width: 768px) {
      header {
        padding: 0.75rem 1.25rem;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        background: rgba(15, 23, 42, 0.9);
      }

      nav {
        display: flex;
        gap: 1rem;
        width: auto;
        margin: 0;
      }

      nav a {
        margin: 0;
        font-size: 0.85rem;
      }

      .logo {
        font-size: 1.2rem;
        gap: 10px;
      }

      .logo img {
        height: 32px;
      }

      .live-indicator {
        font-size: 0.6rem;
        padding: 2px 6px;
      }
    }

    main {
      padding: 8rem 2rem 6rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero-title {
      font-family: var(--font-hero);
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      color: white;
      margin: 0 0 1rem;
      text-align: center;
      background: linear-gradient(to right, #ffffff, #a8caea);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 40px rgba(139, 92, 246, 0.2);
      letter-spacing: -1px;
    }

    .hero-subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: clamp(1rem, 3vw, 1.25rem);
      margin-bottom: 3rem;
      font-family: var(--font-body);
      font-weight: 300;
      letter-spacing: 1px;
      padding: 0 1rem;
    }

    .leaderboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 4rem;
    }

    @media (max-width: 480px) {
      .leaderboard-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
    }

    .rank-card {
      --target-scale: 1;
      background: rgba(15, 20, 35, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 1.5rem;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02), 0 10px 30px rgba(0, 0, 0, 0.2);
      transform: scale(var(--target-scale));
    }

    .rank-card:hover {
      transform: translateY(-8px) scale(calc(var(--target-scale) + 0.02));
      border-color: rgba(139, 92, 246, 0.4);
      box-shadow: inset 0 0 0 1px rgba(139, 92, 246, 0.2), 0 20px 40px -10px rgba(0, 0, 0, 0.5), 0 0 30px rgba(139, 92, 246, 0.3);
      z-index: 10;
    }

    .rank-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--gradient-main);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 2;
    }

    .rank-card:hover::before {
      opacity: 1;
    }

    /* Rank 1 Styling */
    .rank-card.rank-1 {
      --target-scale: 1.05;
      background: linear-gradient(145deg, rgba(40, 35, 15, 0.7), rgba(20, 15, 30, 0.8));
      border: 1px solid rgba(251, 191, 36, 0.4);
      box-shadow: inset 0 0 0 1px rgba(251, 191, 36, 0.2), 0 15px 40px rgba(251, 191, 36, 0.15);
    }

    .rank-card.rank-1:hover {
      transform: translateY(-10px) scale(calc(var(--target-scale) + 0.03));
      border-color: rgba(251, 191, 36, 0.8);
      box-shadow: inset 0 0 0 1px rgba(251, 191, 36, 0.4), 0 25px 50px rgba(251, 191, 36, 0.3);
    }

    .rank-card.rank-1::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(251, 191, 36, 0.15) 0%, transparent 50%);
      animation: rotateGlow 15s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    .rank-card.rank-1 .rank-badge {
      background: linear-gradient(135deg, #fde047, #f59e0b);
      box-shadow: 0 0 25px rgba(251, 191, 36, 0.5), inset 0 0 10px rgba(255, 255, 255, 0.5);
      color: #78350f;
      border: 2px solid rgba(255, 255, 255, 0.4);
    }

    .rank-card.rank-1 .dept-score {
      background: linear-gradient(135deg, #fde047, #f59e0b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .rank-card.rank-1::before {
      background: linear-gradient(135deg, #fde047, #f59e0b);
      opacity: 1;
    }

    /* Rank 2 Styling */
    .rank-card.rank-2 {
      background: linear-gradient(145deg, rgba(30, 35, 45, 0.7), rgba(20, 20, 30, 0.8));
      border: 1px solid rgba(148, 163, 184, 0.4);
      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.2), 0 15px 40px rgba(148, 163, 184, 0.1);
    }

    .rank-card.rank-2:hover {
      border-color: rgba(148, 163, 184, 0.8);
      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.4), 0 20px 40px rgba(148, 163, 184, 0.2);
    }

    .rank-card.rank-2 .rank-badge {
      background: linear-gradient(135deg, #e2e8f0, #94a3b8);
      box-shadow: 0 0 20px rgba(148, 163, 184, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.5);
      color: #0f172a;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .rank-card.rank-2 .dept-score {
      background: linear-gradient(135deg, #f8fafc, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Rank 3 Styling */
    .rank-card.rank-3 {
      background: linear-gradient(145deg, rgba(45, 25, 15, 0.7), rgba(20, 15, 25, 0.8));
      border: 1px solid rgba(217, 119, 6, 0.4);
      box-shadow: inset 0 0 0 1px rgba(217, 119, 6, 0.2), 0 15px 40px rgba(217, 119, 6, 0.1);
    }

    .rank-card.rank-3:hover {
      border-color: rgba(217, 119, 6, 0.8);
      box-shadow: inset 0 0 0 1px rgba(217, 119, 6, 0.4), 0 20px 40px rgba(217, 119, 6, 0.2);
    }

    .rank-card.rank-3 .rank-badge {
      background: linear-gradient(135deg, #fdba74, #ea580c);
      box-shadow: 0 0 20px rgba(217, 119, 6, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.4);
      color: #431407;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .rank-card.rank-3 .dept-score {
      background: linear-gradient(135deg, #fed7aa, #ea580c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .rank-badge {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 800;
      font-family: var(--font-heading);
      flex-shrink: 0;
      color: var(--text-secondary);
      z-index: 1;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .dept-info {
      flex: 1;
      z-index: 1;
    }

    .dept-name {
      font-size: 1.4rem;
      font-weight: 700;
      color: #ffffff;
      font-family: var(--font-heading);
      margin-bottom: 0.25rem;
      letter-spacing: 0.5px;
    }

    .dept-score {
      font-size: 2.5rem;
      font-weight: 800;
      color: #fff;
      font-family: var(--font-heading);
      line-height: 1;
    }

    .dept-score span {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
      -webkit-text-fill-color: var(--text-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-left: 4px;
    }

    @keyframes dropIn {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(calc(var(--target-scale) - 0.05));
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(var(--target-scale));
      }
    }

    @keyframes rotateGlow {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Details Modal styling derived from index.html */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
    }

    .modal-content {
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 95%;
      max-width: 800px;
      max-height: 90vh;
      border-radius: 1.5rem;
      overflow-y: auto;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transform: scale(0.95) translateY(20px);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @media (max-width: 768px) {
      .modal-content {
        width: 100%;
        height: 100%;
        max-height: 100vh;
        border-radius: 0;
        border: none;
      }

      .modal-header {
        padding: 1rem 1.25rem;
        position: sticky;
        top: 0;
        background: #0f172a;
        z-index: 10;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .modal-title {
        font-size: 1.4rem;
      }

      .modal-body {
        padding: 1.25rem;
      }

      .chart-container {
        height: 220px;
        margin-bottom: 1.5rem;
      }
    }

    .modal-overlay.active .modal-content {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.05);
      border: none;
      color: #94a3b8;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      transform: rotate(90deg);
    }

    .modal-body {
      padding: clamp(1rem, 5vw, 2rem);
    }

    .chart-container {
      position: relative;
      height: 300px;
      width: 100%;
      margin-bottom: 2rem;
    }

    .achievements-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
    }

    .achievement-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1rem;
      padding: 1.25rem;
      transition: background 0.3s;
    }

    .achievement-card:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .achievement-item {
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .achievement-student {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .achievement-position {
      color: var(--accent-light, #a78bfa);
      font-weight: 500;
      font-size: 0.9rem;
    }

    .achievement-pts {
      float: right;
      font-weight: 700;
      color: #fbbf24;
    }

    #loader {
      text-align: center;
      padding: 4rem;
      color: var(--text-secondary);
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      background: rgba(239, 68, 68, 0.15);
      padding: 3px 8px;
      border-radius: 1rem;
      color: #ef4444;
      font-weight: 700;
      border: 1px solid rgba(239, 68, 68, 0.3);
      letter-spacing: 0.5px;
    }

    .pulsate {
      width: 6px;
      height: 6px;
      background: #ef4444;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      animation: pulse-red 2s infinite;
    }

    @keyframes pulse-red {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }

      70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
      }

      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    .podium-area {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 2rem;
      margin: 4rem auto 6rem;
      max-width: 1000px;
      padding: 0 1rem;
    }

    .podium-rank {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      transition: all 0.5s ease;
    }

    .podium-rank .rank-card {
      width: 100%;
      flex-direction: column;
      padding: 2.5rem 1.5rem;
      text-align: center;
      gap: 1rem;
    }

    .podium-rank.rank-1-box {
      order: 2;
      transform: scale(1.1);
      z-index: 5;
      margin-bottom: 2rem;
    }

    .podium-rank.rank-2-box {
      order: 1;
      transform: scale(0.95);
      opacity: 0.9;
    }

    .podium-rank.rank-3-box {
      order: 3;
      transform: scale(0.9);
      opacity: 0.8;
    }

    .podium-rank .dept-score {
      font-size: 3rem;
    }

    .podium-rank .rank-badge {
      width: 80px;
      height: 80px;
      font-size: 2.2rem;
    }

    @media (max-width: 768px) {
      main {
        padding: 6rem 1rem 4rem;
      }

      .hero-title {
        font-size: 2.2rem;
        margin-top: 0.5rem;
        letter-spacing: -0.5px;
      }

      .hero-subtitle {
        font-size: 0.9rem;
        margin-bottom: 2.5rem;
        opacity: 0.8;
      }

      .podium-area {
        display: grid;
        grid-template-columns: 1fr 1.2fr 1fr;
        align-items: flex-end;
        gap: 0.5rem;
        margin: 2rem auto 4rem;
        padding: 0;
        max-width: 100%;
      }

      .podium-rank {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        width: 100%;
        position: relative;
      }

      /* Staggered Heights for Mobile Podium */
      .podium-rank.rank-1-box {
        order: 2;
        padding-bottom: 1.5rem; /* Lift 1st place */
      }
      .podium-rank.rank-2-box {
        order: 1;
        padding-bottom: 0.5rem;
      }
      .podium-rank.rank-3-box {
        order: 3;
        padding-bottom: 0;
      }

      .podium-rank .rank-card {
        padding: 1rem 0.5rem !important;
        border-radius: 1rem !important;
        background: rgba(15, 20, 35, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        height: auto !important;
        min-height: 140px;
        justify-content: flex-start !important;
      }

      .podium-rank.rank-1-box .rank-card {
        background: linear-gradient(145deg, rgba(40, 35, 15, 0.8), rgba(20, 15, 30, 0.9));
        border-color: rgba(251, 191, 36, 0.3);
      }

      .podium-rank .rank-badge {
        width: 40px !important;
        height: 40px !important;
        font-size: 1rem !important;
        margin-bottom: 0.5rem !important;
      }

      .podium-rank .dept-info {
        text-align: center;
        width: 100%;
      }

      .podium-rank .dept-name {
        font-size: 0.7rem !important;
        font-weight: 600 !important;
        margin-bottom: 0.4rem !important;
        display: -webkit-box !important;
        -webkit-line-clamp: 3 !important;
        line-clamp: 3 !important;
        -webkit-box-orient: vertical !important;
        overflow: hidden !important;
        min-height: 2.1rem;
        line-height: 0.7rem !important;
      }

      .podium-rank .dept-score {
        font-size: 1.25rem !important;
        font-weight: 800 !important;
      }

      /* Non-podium items */
      .leaderboard-grid {
        gap: 0.75rem;
      }

      .leaderboard-grid .rank-card {
        flex-direction: row !important;
        padding: 0.75rem 1rem !important;
        border-radius: 1rem !important;
        gap: 1rem !important;
      }

      .leaderboard-grid .rank-badge {
        width: 38px !important;
        height: 38px !important;
        font-size: 0.9rem !important;
      }

      .leaderboard-grid .dept-info {
        display: flex !important;
        flex-direction: row !important;
        justify-content: space-between !important;
        align-items: center !important;
        flex: 1;
      }

      .leaderboard-grid .dept-name {
        font-size: 0.85rem !important;
        max-width: 65%;
        margin-bottom: 0 !important;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .leaderboard-grid .dept-score {
        font-size: 1.1rem !important;
      }

      .leaderboard-grid .dept-score span {
        font-size: 0.6rem !important;
        margin-left: 2px !important;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <header>
    <a href="/" class="logo">
      <img src="/assets/Pazhassiraja_College_Pulpally_Logo.png" alt="PRC Logo">
      PRC Fine Arts
      <div class="live-indicator">
        <span class="pulsate"></span>
        LIVE
      </div>
    </a>
    <nav>
      <a href="/">Home</a>
      <a href="/index.html#events">Events</a>
      <a href="/leaderboard.html" style="color: white; text-shadow: 0 0 10px rgba(255,255,255,0.5);">Leaderboard</a>
    </nav>
  </header>

  <main>
    <h1 class="hero-title">Detailed Leaderboard</h1>
    <p class="hero-subtitle">Visual score breakdown for the academic year</p>

    <div id="podium-container" class="podium-area"></div>

    <div id="loader">
      <div class="spinner"></div>
      <div>Compacting points...</div>
    </div>

    <div id="leaderboard-container" class="leaderboard-grid"></div>
  </main>

  <div id="details-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-dept-name" class="modal-title">Department Name</h2>
        <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div id="chart-loader" style="text-align:center; padding: 2rem; color: #94a3b8;">
          <div class="spinner" style="width: 30px; height: 30px;"></div> Loading chart...
        </div>
        <div class="chart-container">
          <canvas id="scoreChart" style="display:none;"></canvas>
        </div>
        <h3 style="font-family: var(--font-heading); margin-bottom: 1rem;">Recent Achievements</h3>
        <div id="achievements-container" class="achievements-grid"></div>
        <div id="no-data-msg" style="display:none; text-align:center; padding: 2rem; color: #94a3b8;">No records found.
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
    import { firebaseConfig } from "./assets/core/firebase-config.js";

    // Initialize Firebase
    window.app = initializeApp(firebaseConfig);
    window.db = getFirestore(window.app);
    let systemYear = '2025-26'; // Default

    const loader = document.getElementById('loader');
    const container = document.getElementById('leaderboard-container');
    let pointsListener = null;

    // Fetch system year first
    async function init() {
      try {
        const yearRef = doc(db, "system_config", "current_year");
        const docSnap = await getDoc(yearRef);
        if (docSnap.exists()) {
          const data = docSnap.data();
          systemYear = data.year || "2025-26";
        }
        startListener();
      } catch (err) {
        console.error("Error fetching settings:", err);
        startListener(); // fallback
      }
    }

    function startListener() {
      const q = query(collection(db, "leaderboard"), where("academicYear", "==", systemYear));

      pointsListener = onSnapshot(q, (snapshot) => {
        loader.style.display = 'none';

        if (snapshot.empty) {
          container.innerHTML = '<div style="text-align:center; grid-column: 1/-1; color: var(--text-secondary);">No scores generated for this year yet.</div>';
          return;
        }

        const leaderboardMap = new Map();
        snapshot.forEach(doc => {
          const data = doc.data();
          const deptName = data.department || doc.id;
          const score = data.score || 0;
          const docId = doc.id;

          const isOfficialId = docId === `${deptName}_${systemYear}`;
          if (!leaderboardMap.has(deptName) || isOfficialId) {
            leaderboardMap.set(deptName, {
              id: docId,
              department: deptName,
              score: score
            });
          }
        });

        const leaderboardData = Array.from(leaderboardMap.values());
        leaderboardData.sort((a, b) => b.score - a.score);

        const filteredData = leaderboardData.filter(d =>
          d.id !== "B.A Economics" && d.id !== "B.A Econometrics and Data Management"
        );

        let podiumHtml = '';
        let gridHtml = '';
        const podiumArea = document.getElementById('podium-container');

        filteredData.forEach((data, index) => {
          const rank = index + 1;
          const score = data.score;
          const isTie = (index > 0 && filteredData[index - 1].score === score) ||
            (index < filteredData.length - 1 && filteredData[index + 1].score === score);

          let rankIcon = `<span style="font-size: 0.8rem; font-weight: 500;">#</span>${rank}`;
          let rankClass = '';
          if (isTie) {
            rankIcon = '<i class="fas fa-equals" style="font-size: 1.2rem; opacity: 0.7;"></i>';
          } else if (rank === 1) {
            rankIcon = '<i class="fas fa-trophy"></i>';
            rankClass = 'rank-1';
          } else if (rank === 2) {
            rankIcon = '<i class="fas fa-medal"></i>';
            rankClass = 'rank-2';
          } else if (rank === 3) {
            rankIcon = '<i class="fas fa-medal"></i>';
            rankClass = 'rank-3';
          }

          const cardHtml = `
            <div class="rank-card ${rankClass}" onclick="openDetails('${(data.department || data.id).replace(/'/g, "\\'")}')" style="animation: dropIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) ${index * 0.08}s both;">
              <div class="rank-badge">${rankIcon}</div>
              <div class="dept-info">
                <div class="dept-name">${data.department || data.id}</div>
                <div class="dept-score">${score} <span>pts</span></div>
              </div>
            </div>
          `;

          if (index < 3) {
            podiumHtml += `<div class="podium-rank rank-${index + 1}-box">${cardHtml}</div>`;
          } else {
            gridHtml += cardHtml;
          }
        });

        podiumArea.innerHTML = podiumHtml;
        container.innerHTML = gridHtml;
      }, (error) => {
        console.error("Listener Error:", error);
        loader.innerHTML = '<div style="color: #ef4444;">Error loading scores. Ensure you are connected to the network.</div>';
        document.getElementById('podium-container').innerHTML = '';
      });
    }

    let currentScoreChart = null;

    window.openDetails = async (dept) => {
      const modal = document.getElementById('details-modal');
      const title = document.getElementById('modal-dept-name');
      const achContainer = document.getElementById('achievements-container');
      const noData = document.getElementById('no-data-msg');
      const chartLoader = document.getElementById('chart-loader');
      const canvas = document.getElementById('scoreChart');

      title.textContent = dept;
      modal.style.display = 'flex';
      setTimeout(() => modal.classList.add('active'), 10);

      chartLoader.style.display = 'block';
      canvas.style.display = 'none';
      noData.style.display = 'none';
      achContainer.innerHTML = '';

      if (currentScoreChart) {
        currentScoreChart.destroy();
        currentScoreChart = null;
      }

      try {
        const q = query(collection(db, "score_logs"),
          where("department", "==", dept),
          where("academicYear", "==", systemYear)
        );
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          chartLoader.style.display = 'none';
          noData.style.display = 'block';
          return;
        }

        const logs = [];
        const dataMap = {};

        querySnapshot.forEach(doc => {
          const data = doc.data();
          logs.push(data);
          const item = data.itemName || "Other";
          dataMap[item] = (dataMap[item] || 0) + (data.points || 0);
        });

        // Charts
        const labels = Object.keys(dataMap);
        const values = Object.values(dataMap);

        chartLoader.style.display = 'none';
        canvas.style.display = 'block';

        const ctx = canvas.getContext('2d');
        currentScoreChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Points Earned',
              data: values,
              backgroundColor: 'rgba(139, 92, 246, 0.7)',
              borderColor: 'rgba(139, 92, 246, 1)',
              borderWidth: 1,
              borderRadius: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false }
            },
            scales: {
              y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
              x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
            }
          }
        });

        // Recent Achievements
        logs.sort((a, b) => {
          const ta = a.timestamp ? new Date(a.timestamp).getTime() : 0;
          const tb = b.timestamp ? new Date(b.timestamp).getTime() : 0;
          return tb - ta;
        });

        let achHtml = '';
        logs.forEach(log => {
          let posStr = '';
          if (log.position) posStr = `<div class="achievement-position">${log.position}</div>`;
          achHtml += `
            <div class="achievement-card">
              <span class="achievement-pts">+${log.points || 0}</span>
              <div class="achievement-item">${log.itemName || 'Unknown Item'}</div>
              <div class="achievement-student">${log.studentName || 'Multiple'}</div>
              ${posStr}
            </div>
          `;
        });
        achContainer.innerHTML = achHtml;

      } catch (err) {
        console.error("Error fetching details:", err);
        chartLoader.style.display = 'none';
        achContainer.innerHTML = '<div style="color: #ef4444;">Failed to load details.</div>';
      }
    };

    window.closeModal = () => {
      const modal = document.getElementById('details-modal');
      modal.classList.remove('active');
      setTimeout(() => modal.style.display = 'none', 300);
    };

    // Close on click outside
    document.getElementById('details-modal').addEventListener('click', (e) => {
      if (e.target.id === 'details-modal') window.closeModal();
    });

    init();
  </script>
</body>

</html>
